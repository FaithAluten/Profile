name: Generate sing-box rule sets

on:
  push:
    branches:
      - main
    paths:
      - "Rule/Block.txt"
      - "Rule/Direct.txt"
      - "Rule/GFW.txt"
      - "scripts/convert_sing_box_rules.py"
      - ".github/workflows/generate-sing-box-rules.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sing-box-rules-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      SING_BOX_VERSION: "1.13.14"
      SING_BOX_SHA256: "f48703461a15476951ac4967cdad339d986f4b8096b4eb3ff0829a500502d697"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Convert text rules to JSON
        run: python3 scripts/convert_sing_box_rules.py

      - name: Test converter
        run: python3 -m unittest discover -s tests -v

      - name: Install sing-box
        run: |
          archive="sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          curl -fL --retry 3 \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${archive}" \
            -o "/tmp/${archive}"
          echo "${SING_BOX_SHA256}  /tmp/${archive}" | sha256sum --check --strict
          mkdir -p /tmp/sing-box
          tar -xzf "/tmp/${archive}" -C /tmp/sing-box --strip-components=1
          /tmp/sing-box/sing-box version

      - name: Compile JSON rules to SRS
        run: |
          mkdir -p sing-box/Rule/SRS
          for name in Block Direct GFW; do
            /tmp/sing-box/sing-box rule-set compile \
              --output "sing-box/Rule/SRS/${name}.srs" \
              "sing-box/Rule/JSON/${name}.json"
          done

      - name: Commit generated rule sets
        run: |
          git add sing-box/Rule/JSON sing-box/Rule/SRS
          if git diff --cached --quiet; then
            echo "Generated rule sets are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update sing-box rule sets"
          git push
